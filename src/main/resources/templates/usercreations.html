<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Creations</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="http://localhost:35729/livereload.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap');

        body {
            font-family: 'Rubik', sans-serif;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
</head>

<body><nav th:replace="header :: header"></nav>
    <br />
    <br />

    <div class="container-sm">
        <h2 class="navbar-brand">My Creations</h2>

        <div th:if="${characters == null or #lists.isEmpty(characters)}">
            <p>No characters found for this email.</p>
        </div>

        <table class="table table-bordered table-striped table-hover" th:if="${characters != null and !#lists.isEmpty(characters)}">
            <thead>
                <tr>
                    <th style="width: 5%; text-align: center">#</th>
                    <th style="width: 15%;">Name</th>
                    <th style="width: 15%;">Author</th>
                    <th style="width: 20%;">Description</th>
                    <th style="width: 10%;">Image</th>
                    <th style="width: 10%;">Votes</th>
                    <th style="width: 15%;"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="character,iteration : ${characters}">
                    <td th:text="${iteration.count}">1</td>
                    <td th:text="${character.name}">Pizzaman</td>
                    <td th:text="${character.author}">Author Name</td>
                    <td th:text="${character.description}">Pizza</td>
                    <td th:text="${character.image != null ? 'Yes' : 'No'}">No</td>
                    <td th:text="${character.votes}">0</td>
                    <td>
                        <a class="btn btn-info" th:href="'characterview?id=' + ${character.id}">View</a>
                        <a class="btn btn-warning" th:href="'verifyemail?next=characteredit&id=' + ${character.id}">Edit</a>
                        <a class="btn btn-danger" th:href="'verifyemail?next=delete&id=' + ${character.id}">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <a href="characterlab" class="btn btn-primary">Add new</a>
        <a href="explorer" class="btn btn-outline-secondary">Back to Explorer</a>
    </div>
</body>
</html>
