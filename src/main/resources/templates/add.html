<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Characters</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="http://localhost:35729/livereload.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap');

        body {
            font-family: 'Rubik', sans-serif;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
</head>

<body><nav th:replace="header :: header"></nav>
    <br />
    <br />

    <div class="container-sm">

        <h2 class="navbar-brand">Add Character</h2>

        <form th:action="@{save}" method="post" enctype="multipart/form-data" th:object="${characters}">

            <div class="mb-3">
                <label for="name" class="form-label">Character Name</label>
                <input type="text" class="form-control" id="name" name="name" th:value="*{name}"
                    placeholder="John" />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Character Email</label>
                <input type="email" class="form-control" id="email" name="email" th:value="*{email}"
                    placeholder="john@example.com" />
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Character Description</label>
                <textarea class="form-control" id="description" name="description" th:value="*{description}"
                    placeholder="Description of the character"></textarea>
            </div>
            <div class="mb-3">
                <label for="image" class="form-label">Character Image</label>
                <input type="file" class="form-control" id="image" name="image" accept="image/*" />
            </div>
            <div class="mb-3">
                <label for="votes" class="form-label">Character Votes</label>
                <input type="number" step="1" class="form-control" id="votes" name="votes" th:value="*{votes}"
                    placeholder="0" />
            </div>
            <!--
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

            <input type="submit" class="btn btn-success" value="Add" />
            <a href="list" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</body>

</html>
