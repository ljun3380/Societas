<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Characters</title>

    <link
      href="/webjars/bootstrap/4.5.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script defer src="/webjars/jquery/3.5.1/jquery.min.js"></script>
    <script defer src="/webjars/popper.js/2.9.2/umd/popper.min.js"></script>
    <script defer src="/webjars/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <style>
    /* 1. Define a consistent spacing variable */
    :root {
        --gallery-spacing: 15px; 
    }

    /* 2. Adjust the row to cancel out the outer padding of the columns */
    .tight-row {
        display: flex;
        flex-wrap: wrap;
        margin-right: calc(-1 * var(--gallery-spacing));
        margin-left: calc(-1 * var(--gallery-spacing));
    }

    /* 3. Apply equal padding to all sides of every column */
    .tight-row > [class*='col-'] {
        padding: var(--gallery-spacing);
    }

    /* 4. Remove the manual margin-bottom from the cards */
    .card-zoom-container {
        margin-bottom: 0 !important; 
        border-radius: 25px;
        overflow: hidden;
        transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
    }
  /* 1. Add extra padding to the main wrapper */
  .custom-container {
    padding-left: 5%;  /* Large side gutters */
    padding-right: 5%;
    margin-top: 80px;   /* Extra breathing room at the top */
  }

  /* 1. Round the main card container */
    .card-zoom-container {
    border-radius: 25px; /* Increase this number for more roundness */
    overflow: hidden;    /* This clips the image to the card's rounded corners */
    border: none;        /* Optional: removes the thin grey border for a modern look */
    
    /* Keep your existing zoom transition */
    transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), 
                box-shadow 0.4s ease;
    }

    /* 2. Ensure the image top corners match (if overflow:hidden isn't enough) */
    .card-img-top {
    border-top-left-radius: 25px;
    border-top-right-radius: 25px;
    width: 100%;
    height: 280px;
    object-fit: cover;
    }

  .card-zoom-container:hover {
    transform: scale(1.05);
    box-shadow: 0 20px 40px rgba(0,0,0,0.12) !important;
    z-index: 10;
  }

  /* Optional: Extra space between the two columns */
  .row {
    margin-left: -20px;
    margin-right: -20px;
  }
  .col-md-6 {
    padding: 20px; 
  }
</style>
  </head>
  <body>
    

<div class="container-fluid custom-container">
  <header class="mb-5 text-center">
    <h1 class="display-3">The First Characters</h1>
    <p class="lead text-muted">A gallery of characters.</p>
    <hr class="my-4" style="width: 50px; border-top: 3px solid #007bff;">
  </header>

  <div class="row tight-row">
    <div th:each="image : ${imageList}" class="col-md-6">
      <div class="card h-100 shadow-sm card-zoom-container">
        <img th:src="@{'/images/' + ${image.name}}" class="card-img-top" th:alt="${image.description}" />
        <div class="card-body p-4">
           <h4 class="" th:text="${image.description}">Description...</h4>
        </div>
      </div>
    </div>
  </div>
</div>
  </body>
</html>
