<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeEpic Gaming | Official Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fixed: Ensure colors match the brand logo exactly */
        :root {
            --we-epic-red: #E30613;
            --we-epic-blue: #0054A6;
        }
        body { background-color: #050505; color: #ffffff; }
        .hero-glow {
            background: radial-gradient(circle at center, rgba(227, 6, 19, 0.15) 0%, rgba(5, 5, 5, 1) 70%);
        }
    </style>
</head>
<body>

    <nav class="flex items-center justify-between px-6 py-4 bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-white/10">
        <div class="flex items-center">
            <img th:src="@{/images/WeEpicLogo.png}" alt="WeEpic" class="h-10 md:h-14">
        </div>
        
        <div class="hidden md:flex space-x-10 text-sm font-bold tracking-widest">
            <a href="#" class="hover:text-red-500 transition">GAMES</a>
            <a href="#" class="hover:text-blue-500 transition">STUDIO</a>
            <a href="#" class="hover:text-red-500 transition">CAREERS</a>
        </div>

        <button class="bg-gradient-to-r from-red-600 to-blue-600 px-6 py-2 rounded text-sm font-black italic">
            PLAY NOW
        </button>
    </nav>

    <section class="hero-glow h-[70vh] flex flex-col items-center justify-center text-center px-4">
        <h1 class="text-7xl md:text-9xl font-black italic mb-4 tracking-tighter uppercase">
            We<span class="text-red-600">Epic</span>
        </h1>
        <p class="text-slate-400 text-lg md:text-xl max-w-xl">
            Pushing the limits of interactive entertainment through epic storytelling and competitive play.
        </p>
    </section>

    <main class="py-16 px-6 max-w-7xl mx-auto">
        <h2 class="text-2xl font-bold mb-8 italic uppercase tracking-tighter">Current Projects</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:if="${games == null}" class="col-span-full text-center py-10 border border-dashed border-white/20">
                <p class="text-slate-500 italic">No games currently active. Check back soon!</p>
            </div>

            <div th:each="game : ${games}" class="group bg-zinc-900 border border-white/5 hover:border-blue-500/50 transition">
                <div class="aspect-video bg-zinc-800 overflow-hidden">
                    <img th:src="@{${game.imageUrl}}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <div class="p-5">
                    <h3 class="text-xl font-bold uppercase italic" th:text="${game.title}">Game Name</h3>
                    <p class="text-sm text-slate-400 mt-2 line-clamp-2" th:text="${game.description}">Description...</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
