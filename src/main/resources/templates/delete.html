<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Satellites</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="http://localhost:35729/livereload.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap');

        body {
            font-family: 'Rubik', sans-serif;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
</head>

<body><nav th:replace="header :: header"></nav>
    <br />
    <br />

    <div class="container-sm">

        <h2 class="navbar-brand">Delete Satellite</h2>

        <div th:if="${satellite.id == null}">
            <div class="alert alert-danger" role="alert" th:text="'Satellite with id[' + ${idS} + '] not found'">
                Satellite not found
            </div>
            <a href="list" class="btn btn-outline-secondary">Go Back</a>
        </div>

        <form th:action="@{delete}" method="post" th:object="${satellite}" th:if="${satellite.id != null}">

            <input type="hidden" id="id" name="id" th:value="*{id}" />

            <div class="mb-3">
                <label for="name" class="form-label">Satellite Name</label>
                <input type="text" class="form-control" id="name" name="name" th:value="*{name}"
                    placeholder="John" />
            </div>
            <div class="mb-3">
                <label for="rocket" class="form-label">Satellite Rocket</label>
                <input type="text" class="form-control" id="rocket" name="rocket" th:value="*{rocket}"
                    placeholder="Mike" />
            </div>
            <div class="mb-3">
                <label for="country" class="form-label">Satellite Country</label>
                <input type="text" class="form-control" id="country" name="country" th:value="*{country}"
                    placeholder="Mars" />
            </div>
            <div class="mb-3">
                <label for="year" class="form-label">Satellite Year</label>
                <input type="number" step="1" class="form-control" id="year" name="year" th:value="*{year}"
                    placeholder="2100" />
            </div>  
            
            <!--<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

            <input type="submit" class="btn btn-danger" value="Delete" />
            <a href="list" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</body>

</html>
