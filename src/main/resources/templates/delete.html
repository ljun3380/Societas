<!DOCTYPE html>

<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Characters</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <script src="http://localhost:35729/livereload.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap');

        body {
            font-family: 'Rubik', sans-serif;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>
</head>

<body><nav th:replace="header :: header"></nav>
    <br />
    <br />

    <div class="container-sm">

        <h2 class="navbar-brand">Delete Character</h2>

        <div th:if="${character.id == null}">
            <div class="alert alert-danger" role="alert" th:text="'Character with id[' + ${id} + '] not found'">
                Character not found
            </div>
            <a href="list" class="btn btn-outline-secondary">Go Back</a>
        </div>

        <form th:action="@{delete}" method="post" th:object="${character}" th:if="${character.id != null}">

            <input type="hidden" id="id" name="id" th:value="*{id}" />

            <div class="mb-3">
                <label for="name" class="form-label">Character Name</label>
                <input type="text" class="form-control" id="name" name="name" th:value="*{name}"
                    placeholder="John" readonly />
            </div>
            <div class="mb-3">
                <label for="author" class="form-label">Character Author</label>
                <input type="text" class="form-control" id="author" name="author" th:value="*{author}"
                    placeholder="Author Name" readonly />
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Character Description</label>
                <textarea class="form-control" id="description" name="description" th:value="*{description}"
                    placeholder="Description of the character" readonly></textarea>
            </div>
            <div class="mb-3">
                <label for="image" class="form-label">Character Image</label>
                <input type="text" class="form-control" id="image" value="Image uploaded" readonly th:if="${character.image != null}" />
                <input type="text" class="form-control" id="image" value="No image" readonly th:if="${character.image == null}" />
            </div>
            <div class="mb-3">
                <label for="votes" class="form-label">Character Votes</label>
                <input type="number" step="1" class="form-control" id="votes" name="votes" th:value="*{votes}"
                    placeholder="0" readonly />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Character Email</label>
                <input type="email" class="form-control" id="email" name="email" th:value="*{email}"
                    placeholder="john@example.com" readonly />
            </div>
            
            <!--<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

            <input type="submit" class="btn btn-danger" value="Delete" />
            <a href="list" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</body>

</html>
